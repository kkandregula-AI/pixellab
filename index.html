<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#060a10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="PixelLab">
<title>PixelLab — Auto Smart Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Exo+2:wght@300;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060a10;--bg2:#0c1420;--bg3:#121d2c;--bg4:#080e18;
  --border:#1a2e47;--accent:#00d4ff;--accent-dim:#0090b0;
  --accent2:#ff6030;--text:#90aac5;--text-bright:#d8eaf8;
  --text-dim:#3d5a78;--ok:#00ff88;
  --mono:'Space Mono',monospace;--ui:'Exo 2',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--ui);min-height:100vh;overflow:hidden}

header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 20px;
  display:flex;align-items:center;gap:16px;height:49px;position:relative;z-index:10}
.logo{font-family:var(--mono);font-size:16px;color:var(--accent);letter-spacing:3px}
.logo b{color:var(--accent2)}
.tagline{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.hbadge{margin-left:auto;font-family:var(--mono);font-size:9px;color:var(--text-dim);
  border:1px solid var(--border);padding:3px 8px;border-radius:3px}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:288px 1fr;height:calc(100vh - 49px)}

/* ── SIDEBAR ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100%;overflow:hidden}
.sidebar-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar-scroll::-webkit-scrollbar{width:4px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sidebar-footer{border-top:1px solid var(--border);padding:12px 14px;background:var(--bg2);flex-shrink:0}

.panel{padding:12px 14px;border-bottom:1px solid var(--border)}
.sec-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);
  font-family:var(--mono);display:flex;align-items:center;gap:8px;margin-bottom:10px;transition:color .3s}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-label.done{color:var(--ok)}

/* Upload */
.upload-zone{border:2px dashed var(--border);border-radius:6px;padding:14px 10px;text-align:center;
  cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:rgba(0,212,255,.04)}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:22px;display:block;margin-bottom:4px;opacity:.4}
.upload-zone strong{color:var(--accent);font-size:11px;display:block;margin-bottom:2px}
.upload-zone p{font-size:10px;color:var(--text-dim);line-height:1.5}
.img-badge{font-family:var(--mono);font-size:9px;color:var(--text-dim);text-align:center;margin-top:5px;min-height:12px}

.collapsible{display:none}.collapsible.open{display:block}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mc{background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:7px 8px}
.mc.full{grid-column:1/-1}
.mn{font-family:var(--mono);font-size:8px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.mb{height:2px;background:var(--border);border-radius:1px;margin-bottom:4px;overflow:hidden}
.mf{height:100%;border-radius:1px}
.mr{display:flex;justify-content:space-between;align-items:center}
.mv{font-family:var(--mono);font-size:10px;color:var(--text-bright)}
.mtag{font-size:8px;padding:1px 4px;border-radius:2px;font-family:var(--mono);white-space:nowrap}
.tw{background:rgba(255,96,48,.12);color:var(--accent2);border:1px solid rgba(255,96,48,.25)}
.to{background:rgba(0,212,255,.08);color:var(--accent);border:1px solid rgba(0,212,255,.2)}
.tg{background:rgba(0,255,136,.08);color:var(--ok);border:1px solid rgba(0,255,136,.2)}

/* Pipeline */
.pipe-summary{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.15);
  border-radius:5px;padding:7px 10px;margin-bottom:8px;font-size:9px;color:var(--accent-dim);
  font-family:var(--mono);line-height:1.6;transition:all .4s}
.pipe-summary.done{background:rgba(0,255,136,.05);border-color:rgba(0,255,136,.2);color:var(--ok)}
.pipe-steps{display:flex;flex-direction:column;gap:5px}

/* Step card — key: stays in its final state after run */
.sc{display:flex;align-items:flex-start;gap:8px;background:var(--bg4);
  border:1px solid var(--border);border-radius:5px;padding:8px 10px;transition:all .35s}
.sc.active{border-color:var(--accent);background:rgba(0,212,255,.06)}
.sc.done{border-color:var(--ok);background:rgba(0,255,136,.04)}
.sc-num{width:18px;height:18px;border-radius:50%;background:var(--border);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-family:var(--mono);
  font-size:8px;color:var(--text-dim);margin-top:1px;transition:all .3s}
.sc.active .sc-num{background:var(--accent);color:var(--bg)}
.sc.done .sc-num{background:var(--ok);color:var(--bg);font-size:11px}
.sc-spin{width:14px;height:14px;border:1.5px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;margin-top:2px;display:none}
.sc.active .sc-spin{display:block}.sc.active .sc-num{display:none}
.sc-body{flex:1;min-width:0}
.sc-head{display:flex;justify-content:space-between;align-items:center;gap:6px}
.sc-name{font-family:var(--mono);font-size:11px;color:var(--text-bright);font-weight:700}
.sc.active .sc-name{color:var(--accent)}.sc.done .sc-name{color:var(--ok)}
.sc-time{font-family:var(--mono);font-size:9px;color:var(--ok);opacity:0;transition:opacity .3s;white-space:nowrap}
.sc.done .sc-time{opacity:1}
.sc-reason{font-size:9px;color:var(--text-dim);line-height:1.4;margin-top:2px}
.sc-params{font-family:var(--mono);font-size:8px;color:var(--text-dim);margin-top:3px;opacity:.6}
/* Result line shown after step done */
.sc-result{font-size:9px;color:var(--ok);margin-top:3px;opacity:0;transition:opacity .3s;font-family:var(--mono)}
.sc.done .sc-result{opacity:.8}

/* Buttons */
.btn{padding:9px 12px;border-radius:5px;border:none;cursor:pointer;font-family:var(--mono);
  font-size:11px;letter-spacing:1px;text-transform:uppercase;transition:all .15s;width:100%}
.btn-run{background:var(--accent);color:var(--bg);font-weight:700;font-size:12px;padding:11px}
.btn-run:hover:not(:disabled){background:#33ddff;box-shadow:0 0 16px rgba(0,212,255,.35)}
.btn-run:disabled{opacity:.3;cursor:not-allowed}
.btn-s{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-s:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.btn-s:disabled{opacity:.25;cursor:not-allowed}
.btn-dl{background:rgba(0,255,136,.06);color:var(--ok);border:1px solid rgba(0,255,136,.25);
  font-size:10px;margin-top:6px}
.btn-dl:hover:not(:disabled){background:rgba(0,255,136,.12);box-shadow:0 0 12px rgba(0,255,136,.15)}
.btn-dl:disabled{opacity:.2;cursor:not-allowed}
.btn-row{display:flex;gap:6px;margin-top:6px}.btn-row .btn{flex:1}

/* ── MAIN ── */
.main{display:flex;flex-direction:column;height:100%;overflow:hidden}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 50%,#0d1e30 0%,var(--bg) 70%);
  position:relative;overflow:hidden;padding:16px}

.drop-hint{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text-dim);
  pointer-events:none}
.drop-hint .bi{font-size:52px;opacity:.14}
.drop-hint p{font-size:12px;letter-spacing:2px;text-transform:uppercase;font-family:var(--mono)}
.drop-hint small{font-size:10px;opacity:.4}

/* THE canvas — single element, no more clip-path CSS issues */
#cv{display:none;max-width:100%;max-height:100%;border-radius:4px;cursor:ew-resize;touch-action:none}
#cv.visible{display:block}

/* Processing overlay */
.proc{position:absolute;inset:0;background:rgba(6,10,16,.92);
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:20}
.proc.on{display:flex}
.spinner{width:38px;height:38px;border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.proc-t{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:2px;text-transform:uppercase}
.proc-s{font-family:var(--mono);font-size:9px;color:var(--text-dim);text-align:center;max-width:280px;line-height:1.4}

/* Stats */
.stats{background:var(--bg2);border-top:1px solid var(--border);padding:5px 16px;
  display:flex;gap:20px;align-items:center;font-family:var(--mono);font-size:10px;
  color:var(--text-dim);min-height:30px;flex-shrink:0}
.stat em{color:var(--accent);font-style:normal}

/* Toast */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--accent-dim);color:var(--accent);
  padding:7px 16px;border-radius:5px;font-family:var(--mono);font-size:11px;
  letter-spacing:1px;z-index:100;display:none;white-space:nowrap}

@media(max-width:700px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr;height:auto;overflow:auto}
  .sidebar{height:auto;overflow:visible}
  .sidebar-scroll{overflow:visible}
  .main{height:60vh}
  .hbadge{display:none}
  body{overflow:auto}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">Pixel<b>Lab</b></div>
    <div class="tagline">Auto Smart Pipeline · Zero AI · Pure Math</div>
  </div>
  <div class="hbadge">⬡ Image-Adaptive · 7 Algorithms</div>
</header>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-scroll">

      <!-- UPLOAD -->
      <div class="panel">
        <div class="sec-label">Image</div>
        <div class="upload-zone" id="uzone">
          <input type="file" id="fin" accept="image/*">
          <span class="upload-icon">⬡</span>
          <strong>Drop image here</strong>
          <p>or click to browse · JPG PNG WEBP</p>
        </div>
        <div class="img-badge" id="ibadge"></div>
      </div>

      <!-- ANALYSIS -->
      <div class="panel collapsible" id="aPanel">
        <div class="sec-label" id="aLabel">Image Analysis</div>
        <div class="metrics-grid" id="mgrid"></div>
      </div>

      <!-- PIPELINE -->
      <div class="panel collapsible" id="pPanel">
        <div class="sec-label" id="pLabel">Auto Pipeline</div>
        <div class="pipe-summary" id="pSum"></div>
        <div class="pipe-steps" id="pSteps"></div>
      </div>

    </div><!-- /scroll -->

    <!-- STICKY FOOTER -->
    <div class="sidebar-footer">
      <button class="btn btn-run" id="runBtn" disabled>▶ Run Pipeline</button>
      <div class="btn-row">
        <button class="btn btn-s" id="rstBtn" disabled>↺ Reset</button>
        <button class="btn btn-s" id="newBtn" disabled>⟳ New Image</button>
      </div>
      <button class="btn btn-dl" id="dlBtn" disabled>↓ Download Enhanced Image</button>
    </div>
  </aside>

  <main class="main">
    <div class="canvas-area" id="carea">
      <div class="drop-hint" id="dhint">
        <div class="bi">⬡</div>
        <p>Upload an image to begin</p>
        <small>Analysis runs instantly · No AI involved</small>
      </div>
      <!-- SINGLE CANVAS — split view drawn via Canvas 2D API -->
      <canvas id="cv"></canvas>
      <div class="proc" id="proc">
        <div class="spinner"></div>
        <div class="proc-t" id="pt">Processing…</div>
        <div class="proc-s" id="ps"></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">SIZE <em id="ss">—</em></div>
      <div class="stat">STEPS <em id="sp">—</em></div>
      <div class="stat">TIME <em id="st">—</em></div>
      <div class="stat" style="margin-left:auto;font-size:9px;opacity:.3">⇔ Drag to compare</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════
//  FAST BOX BLUR  (O(n), 3-pass ≈ Gaussian)
// ════════════════════════════════════════════════════════
function bH(s,W,H,r){const d=new Float32Array(s.length),m=2*r+1;for(let y=0;y<H;y++){const b=y*W;let v=(r+1)*s[b];for(let x=1;x<=r;x++)v+=s[b+Math.min(W-1,x)];for(let x=0;x<W;x++){d[b+x]=v/m;v+=s[b+Math.min(W-1,x+r+1)];v-=s[b+Math.max(0,x-r)];}}return d;}
function bV(s,W,H,r){const d=new Float32Array(s.length),m=2*r+1;for(let x=0;x<W;x++){let v=(r+1)*s[x];for(let y=1;y<=r;y++)v+=s[Math.min(H-1,y)*W+x];for(let y=0;y<H;y++){d[y*W+x]=v/m;v+=s[Math.min(H-1,y+r+1)*W+x];v-=s[Math.max(0,y-r)*W+x];}}return d;}
function blurCh(s,W,H,sig){const r=Math.max(0,Math.round(sig));if(!r)return s instanceof Float32Array?s:new Float32Array(s);let t=s instanceof Float32Array?s:new Float32Array(s);for(let p=0;p<3;p++){t=bH(t,W,H,r);t=bV(t,W,H,r);}return t;}
function blurRGB(src,W,H,sig){const n=W*H,cs=[new Float32Array(n),new Float32Array(n),new Float32Array(n)];for(let i=0;i<n;i++){cs[0][i]=src[i*4];cs[1][i]=src[i*4+1];cs[2][i]=src[i*4+2];}const b=cs.map(c=>blurCh(c,W,H,sig));const d=new Uint8ClampedArray(src.length);for(let i=0;i<n;i++){d[i*4]=b[0][i];d[i*4+1]=b[1][i];d[i*4+2]=b[2][i];d[i*4+3]=src[i*4+3];}return d;}

// ════════════════════════════════════════════════════════
//  ALGORITHMS
// ════════════════════════════════════════════════════════
function doCLAHE(src,W,H,clip,tile){
  const d=new Uint8ClampedArray(src.length);
  const tX=Math.max(1,Math.ceil(W/tile)),tY=Math.max(1,Math.ceil(H/tile));
  const cl=Array.from({length:tY},()=>Array(tX));
  for(let ty=0;ty<tY;ty++)for(let tx=0;tx<tX;tx++){
    const x0=tx*tile,y0=ty*tile,x1=Math.min(x0+tile,W),y1=Math.min(y0+tile,H);
    const px=(x1-x0)*(y1-y0),hist=new Int32Array(256);
    for(let y=y0;y<y1;y++)for(let x=x0;x<x1;x++){const i=(y*W+x)*4;hist[Math.round(.299*src[i]+.587*src[i+1]+.114*src[i+2])]++;}
    const lim=Math.max(1,Math.round(clip*px/256));let ex=0;
    for(let v=0;v<256;v++){if(hist[v]>lim){ex+=hist[v]-lim;hist[v]=lim;}}
    const add=Math.floor(ex/256);let rem=ex%256;
    for(let v=0;v<256;v++){hist[v]+=add;if(rem-->0)hist[v]++;}
    const lut=new Uint8ClampedArray(256);let cdf=0;
    for(let v=0;v<256;v++){cdf+=hist[v];lut[v]=Math.round(cdf*255/px);}
    cl[ty][tx]=lut;
  }
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const i=(y*W+x)*4,lum=Math.round(.299*src[i]+.587*src[i+1]+.114*src[i+2]);
    const fx=(x+.5)/tile-.5,fy=(y+.5)/tile-.5;
    const tx0=Math.max(0,Math.min(tX-2,Math.floor(fx))),ty0=Math.max(0,Math.min(tY-2,Math.floor(fy)));
    const tx1=Math.min(tX-1,tx0+1),ty1=Math.min(tY-1,ty0+1);
    const wx=Math.max(0,Math.min(1,fx-tx0)),wy=Math.max(0,Math.min(1,fy-ty0));
    const v=cl[ty0][tx0][lum]*(1-wx)*(1-wy)+cl[ty0][tx1][lum]*wx*(1-wy)+cl[ty1][tx0][lum]*(1-wx)*wy+cl[ty1][tx1][lum]*wx*wy;
    const sc=lum>0?v/lum:1;
    d[i]=Math.min(255,src[i]*sc|0);d[i+1]=Math.min(255,src[i+1]*sc|0);d[i+2]=Math.min(255,src[i+2]*sc|0);d[i+3]=src[i+3];
  }
  return d;
}
function doUnsharp(src,W,H,rad,amt,thr){
  const bl=blurRGB(src,W,H,rad),d=new Uint8ClampedArray(src.length);
  for(let i=0;i<src.length;i+=4){
    for(let c=0;c<3;c++){const df=src[i+c]-bl[i+c];d[i+c]=Math.max(0,Math.min(255,src[i+c]+(Math.abs(df)>thr?amt*df:0)));}
    d[i+3]=src[i+3];
  }
  return d;
}
function doBilateral(src,W,H,sS,rS){
  const d=new Uint8ClampedArray(src.length),r=Math.ceil(2*sS),ss=2*sS*sS,rs=2*rS*rS;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const ci=(y*W+x)*4,cR=src[ci],cG=src[ci+1],cB=src[ci+2];
    let aR=0,aG=0,aB=0,aW=0;
    for(let dy=-r;dy<=r;dy++){const ny=Math.max(0,Math.min(H-1,y+dy));
      for(let dx=-r;dx<=r;dx++){const nx=Math.max(0,Math.min(W-1,x+dx));
        const ni=(ny*W+nx)*4,nR=src[ni],nG=src[ni+1],nB=src[ni+2];
        const w=Math.exp(-(dx*dx+dy*dy)/ss-((nR-cR)**2+(nG-cG)**2+(nB-cB)**2)/rs);
        aR+=w*nR;aG+=w*nG;aB+=w*nB;aW+=w;
      }
    }
    d[ci]=aR/aW|0;d[ci+1]=aG/aW|0;d[ci+2]=aB/aW|0;d[ci+3]=src[ci+3];
  }
  return d;
}
function doRetinex(src,W,H,scales){
  const n=W*H,wt=1/scales.length,d=new Uint8ClampedArray(src.length);
  for(let c=0;c<3;c++){
    const ch=new Float32Array(n);for(let i=0;i<n;i++)ch[i]=src[i*4+c]+1;
    const lc=ch.map(v=>Math.log(v)),out=new Float32Array(n);
    for(const sig of scales){const bl=blurCh(ch,W,H,sig);for(let i=0;i<n;i++)out[i]+=wt*(lc[i]-Math.log(Math.max(bl[i],1)));}
    let mn=Infinity,mx=-Infinity;for(let i=0;i<n;i++){if(out[i]<mn)mn=out[i];if(out[i]>mx)mx=out[i];}
    const rng=mx-mn||1;for(let i=0;i<n;i++)d[i*4+c]=(out[i]-mn)/rng*255|0;
  }
  for(let i=0;i<n;i++)d[i*4+3]=src[i*4+3];return d;
}
function doNLM(src,W,H,h,sR,pR){
  const d=new Uint8ClampedArray(src.length),h2=h*h,ps=(2*pR+1)**2;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const ci=(y*W+x)*4;let sRc=0,sGc=0,sBc=0,sW=0;
    for(let sy=-sR;sy<=sR;sy++)for(let sx=-sR;sx<=sR;sx++){
      const ny=y+sy,nx=x+sx;if(ny<0||ny>=H||nx<0||nx>=W)continue;
      let dist=0;
      for(let py=-pR;py<=pR;py++)for(let px=-pR;px<=pR;px++){
        const ay=Math.max(0,Math.min(H-1,y+py)),ax=Math.max(0,Math.min(W-1,x+px));
        const by=Math.max(0,Math.min(H-1,ny+py)),bx=Math.max(0,Math.min(W-1,nx+px));
        const ai=(ay*W+ax)*4,bi=(by*W+bx)*4;
        for(let cv=0;cv<3;cv++){const dv=src[ai+cv]-src[bi+cv];dist+=dv*dv;}
      }
      const w=Math.exp(-dist/(3*ps*65025*h2));
      const ni=(ny*W+nx)*4;sRc+=w*src[ni];sGc+=w*src[ni+1];sBc+=w*src[ni+2];sW+=w;
    }
    d[ci]=sRc/sW|0;d[ci+1]=sGc/sW|0;d[ci+2]=sBc/sW|0;d[ci+3]=src[ci+3];
  }
  return d;
}

// ════════════════════════════════════════════════════════
//  IMAGE ANALYSIS
// ════════════════════════════════════════════════════════
function analyzeImage(data,W,H){
  const n=W*H,lum=new Float32Array(n);
  for(let i=0;i<n;i++)lum[i]=.299*data[i*4]+.587*data[i*4+1]+.114*data[i*4+2];
  let sumL=0;for(let i=0;i<n;i++)sumL+=lum[i];const brightness=sumL/n;
  let sq=0;for(let i=0;i<n;i++)sq+=(lum[i]-brightness)**2;const contrast=Math.sqrt(sq/n);
  let ls=0,lc=0;
  for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){const i=y*W+x;ls+=Math.abs(4*lum[i]-lum[i-1]-lum[i+1]-lum[i-W]-lum[i+W]);lc++;}
  const sharpness=ls/lc;
  let ns=0,nsq=0,nc=0;
  for(let y=1;y<H-1;y++)for(let x=1;x<W-1;x++){let m=0;for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++)m+=lum[(y+dy)*W+(x+dx)];m/=9;const df=lum[y*W+x]-m;ns+=df;nsq+=df*df;nc++;}
  const noise=Math.sqrt(nsq/nc-(ns/nc)**2);
  const qM=[0,0,0,0],qN=[0,0,0,0];
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){const q=(y>=H/2?2:0)+(x>=W/2?1:0);qM[q]+=lum[y*W+x];qN[q]++;}
  for(let q=0;q<4;q++)qM[q]/=qN[q];const qa=qM.reduce((a,b)=>a+b,0)/4;
  const lightingVar=Math.sqrt(qM.reduce((a,b)=>a+(b-qa)**2,0)/4);
  return{brightness,contrast,sharpness,noise,lightingVar};
}

// ════════════════════════════════════════════════════════
//  PIPELINE BUILDER
// ════════════════════════════════════════════════════════
function buildPipeline(m){
  const steps=[];
  const isDark=m.brightness<80,isLowC=m.contrast<38;
  const isNoisy=m.noise>4.5,isVNoisy=m.noise>11;
  const isBlurry=m.sharpness<10,isSoft=m.sharpness<22&&!isBlurry;
  const isUneven=m.lightingVar>22;
  if(isUneven)steps.push({name:'Multi-Scale Retinex',reason:'Uneven lighting → illumination normalization first',pl:'σ = 15·60·120',params:{s1:15,s2:60,s3:120},fn:(s,W,H,p)=>doRetinex(s,W,H,[p.s1,p.s2,p.s3])});
  if(isDark||isLowC){const clip=isDark?3.5:2.0;steps.push({name:'CLAHE',reason:isDark?'Dark image → adaptive contrast boost':'Flat contrast → local histogram eq.',pl:'clip='+clip+' tile=64px',params:{clip,tile:64},fn:(s,W,H,p)=>doCLAHE(s,W,H,p.clip,p.tile)});}
  if(isNoisy){if(isVNoisy)steps.push({name:'Non-Local Means',reason:'High noise → patch denoising (before sharpening)',pl:'h=0.08 search=5 patch=2',params:{h:.08,sR:5,pR:2},fn:(s,W,H,p)=>doNLM(s,W,H,p.h,p.sR,p.pR)});
  else steps.push({name:'Bilateral Filter',reason:'Moderate noise → edge-preserving smoothing',pl:'spatial σ=3 range σ=40',params:{sS:3,rS:40},fn:(s,W,H,p)=>doBilateral(s,W,H,p.sS,p.rS)});}
  if(isBlurry)steps.push({name:'Unsharp Mask',reason:'Blurry image → aggressive sharpening (last step)',pl:'radius=3 amount=1.8 thr=3',params:{rad:3,amt:1.8,thr:3},fn:(s,W,H,p)=>doUnsharp(s,W,H,p.rad,p.amt,p.thr)});
  else if(isSoft||(!isNoisy&&steps.length>0))steps.push({name:'Unsharp Mask',reason:isSoft?'Slightly soft → mild sharpening finish':'Final crispness pass',pl:'radius=1.5 amount=1.0 thr=4',params:{rad:1.5,amt:1.0,thr:4},fn:(s,W,H,p)=>doUnsharp(s,W,H,p.rad,p.amt,p.thr)});
  if(!steps.length){steps.push({name:'CLAHE',reason:'Well-balanced → gentle contrast polish',pl:'clip=1.5 tile=80px',params:{clip:1.5,tile:80},fn:(s,W,H,p)=>doCLAHE(s,W,H,p.clip,p.tile)});steps.push({name:'Unsharp Mask',reason:'Mild sharpness enhancement',pl:'radius=1 amount=0.7 thr=5',params:{rad:1,amt:.7,thr:5},fn:(s,W,H,p)=>doUnsharp(s,W,H,p.rad,p.amt,p.thr)});}
  return steps;
}

// ════════════════════════════════════════════════════════
//  SPLIT CANVAS — single canvas, Canvas 2D clipping
//  Pointer capture = perfectly stable drag on all devices
// ════════════════════════════════════════════════════════
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const offBefore=document.createElement('canvas'); // original
const offAfter =document.createElement('canvas'); // enhanced
let splitPos=.5, hasBefore=false, hasAfter=false;

function drawSplit(){
  if(!hasBefore) return;
  const W=cv.width,H=cv.height,sx=Math.round(splitPos*W);

  // Left: original
  ctx.drawImage(offBefore,0,0);

  // Right: enhanced (clipped)
  if(hasAfter){
    ctx.save();
    ctx.beginPath();ctx.rect(sx,0,W-sx,H);ctx.clip();
    ctx.drawImage(offAfter,0,0);
    ctx.restore();
  }

  // Divider line
  ctx.save();
  ctx.shadowColor='rgba(0,212,255,.8)';ctx.shadowBlur=10;
  ctx.strokeStyle='#00d4ff';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(sx,0);ctx.lineTo(sx,H);ctx.stroke();
  ctx.restore();

  // Handle circle
  const hy=H/2;
  ctx.save();
  ctx.shadowColor='rgba(0,212,255,.6)';ctx.shadowBlur=14;
  ctx.fillStyle='#00d4ff';
  ctx.beginPath();ctx.arc(sx,hy,14,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.fillStyle='#060a10';ctx.font='bold 11px monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('⇔',sx,hy);

  // Labels (drawn on canvas, not DOM — no positioning issues)
  function label(txt,lx,color,align){
    const pad=8,fh=13;
    ctx.font='bold 9px monospace';ctx.textAlign=align;
    const tw=ctx.measureText(txt).width;
    const bx=align==='left'?lx-pad:lx-tw-pad;
    ctx.fillStyle='rgba(6,10,16,.8)';
    ctx.fillRect(bx,8,tw+pad*2,fh+6);
    ctx.fillStyle=color;ctx.textBaseline='middle';
    ctx.fillText(txt,align==='left'?lx:lx-pad,8+(fh+6)/2);
  }
  label('◀ ORIGINAL',sx-10,'#5a7a9a','right');
  if(hasAfter) label('ENHANCED ▶',sx+10,'#00ff88','left');
}

// ── Pointer events (stable on mouse + touch + pen) ──
let pDown=false;
function spFromEvent(e){
  const r=cv.getBoundingClientRect();
  return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
}
cv.addEventListener('pointerdown',e=>{
  pDown=true;
  cv.setPointerCapture(e.pointerId); // locks drag to this element — fixes jitter
  splitPos=spFromEvent(e);
  drawSplit();
  e.preventDefault();
});
cv.addEventListener('pointermove',e=>{
  if(!pDown)return;
  splitPos=spFromEvent(e);
  drawSplit();
  e.preventDefault();
});
cv.addEventListener('pointerup',e=>{
  pDown=false;
  cv.releasePointerCapture(e.pointerId);
});
cv.addEventListener('pointercancel',e=>{
  pDown=false;
});

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let origData=null,enhData=null,imgW=0,imgH=0,pipeline=[];

// ════════════════════════════════════════════════════════
//  DOM REFS
// ════════════════════════════════════════════════════════
const $=id=>document.getElementById(id);
const uzone=$('uzone'),fin=$('fin');
const aPanel=$('aPanel'),pPanel=$('pPanel'),mgrid=$('mgrid');
const pSteps=$('pSteps'),pSum=$('pSum');
const aLabel=$('aLabel'),pLabel=$('pLabel');
const runBtn=$('runBtn'),rstBtn=$('rstBtn'),newBtn=$('newBtn'),dlBtn=$('dlBtn');
const dhint=$('dhint'),proc=$('proc'),pt=$('pt'),ps=$('ps');
const ibadge=$('ibadge'),ssStat=$('ss'),spStat=$('sp'),stStat=$('st');
const toastEl=$('toast');

// ════════════════════════════════════════════════════════
//  RENDER ANALYSIS
// ════════════════════════════════════════════════════════
function renderAnalysis(m){
  mgrid.innerHTML='';
  function card(name,val,min,max,tcls,ttxt,full=false){
    const pct=Math.round(Math.max(0,Math.min(100,(val-min)/(max-min)*100)));
    const col={tw:'#ff6030',to:'#00d4ff',tg:'#00ff88'}[tcls]||'#00d4ff';
    const el=document.createElement('div');el.className='mc'+(full?' full':'');
    el.innerHTML=`<div class="mn">${name}</div>
      <div class="mb"><div class="mf" style="width:${pct}%;background:${col}"></div></div>
      <div class="mr"><span class="mv">${Math.round(val)}</span><span class="mtag ${tcls}">${ttxt}</span></div>`;
    mgrid.appendChild(el);
  }
  card('Brightness',m.brightness,0,255,m.brightness<80?'tw':m.brightness>185?'tw':'tg',m.brightness<80?'DARK':m.brightness>185?'BRIGHT':'NORMAL');
  card('Contrast',m.contrast,0,100,m.contrast<38?'tw':'tg',m.contrast<38?'LOW':'NORMAL');
  card('Sharpness',m.sharpness,0,60,m.sharpness<22?'tw':'tg',m.sharpness<10?'BLURRY':m.sharpness<22?'SOFT':'SHARP');
  card('Noise',m.noise,0,20,m.noise>4.5?'tw':'tg',m.noise>11?'NOISY':m.noise>4.5?'GRAINY':'CLEAN');
  card('Lighting',m.lightingVar,0,60,m.lightingVar>22?'tw':'tg',m.lightingVar>22?'UNEVEN':'UNIFORM',true);
  aPanel.classList.add('open');
}

// ════════════════════════════════════════════════════════
//  RENDER PIPELINE STEPS (initial state)
// ════════════════════════════════════════════════════════
function renderPipeline(steps){
  pSteps.innerHTML='';
  pLabel.textContent='Auto Pipeline';
  pLabel.className='sec-label';
  pSum.textContent=steps.length+' step'+(steps.length>1?'s':'')+': '+steps.map(s=>s.name).join(' → ');
  pSum.className='pipe-summary';
  spStat.textContent=steps.length;
  steps.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='sc';el.id='sc'+i;
    el.innerHTML=`
      <div class="sc-num" id="sn${i}">${i+1}</div>
      <div class="sc-spin"></div>
      <div class="sc-body">
        <div class="sc-head">
          <span class="sc-name">${s.name}</span>
          <span class="sc-time" id="st${i}"></span>
        </div>
        <div class="sc-reason">${s.reason}</div>
        <div class="sc-params">${s.pl}</div>
        <div class="sc-result" id="sr${i}"></div>
      </div>`;
    pSteps.appendChild(el);
  });
  pPanel.classList.add('open');
  runBtn.disabled=false;
  setTimeout(()=>pPanel.scrollIntoView({behavior:'smooth',block:'nearest'}),200);
}

// ════════════════════════════════════════════════════════
//  LOAD IMAGE
// ════════════════════════════════════════════════════════
function loadImage(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=900;let w=img.width,h=img.height;
      if(Math.max(w,h)>MAX){const sc=MAX/Math.max(w,h);w=Math.round(w*sc);h=Math.round(h*sc);}
      imgW=w;imgH=h;
      // Setup offscreen canvases
      [offBefore,offAfter].forEach(o=>{o.width=w;o.height=h;});
      cv.width=w;cv.height=h;
      const tmp=document.createElement('canvas');tmp.width=w;tmp.height=h;
      tmp.getContext('2d').drawImage(img,0,0,w,h);
      origData=tmp.getContext('2d').getImageData(0,0,w,h);
      enhData=null;
      offBefore.getContext('2d').putImageData(origData,0,0);
      offAfter.getContext('2d').putImageData(origData,0,0); // show original on both sides initially
      hasBefore=true;hasAfter=false;
      dhint.style.display='none';cv.classList.add('visible');
      drawSplit();
      rstBtn.disabled=false;newBtn.disabled=false;dlBtn.disabled=true;
      ibadge.textContent=img.width+'×'+img.height+' → '+w+'×'+h+' px';
      ssStat.textContent=w+'×'+h;
      const metrics=analyzeImage(origData.data,w,h);
      renderAnalysis(metrics);
      pipeline=buildPipeline(metrics);
      renderPipeline(pipeline);
      showToast('Analysis done — '+pipeline.length+' steps selected ✓');
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

// ════════════════════════════════════════════════════════
//  RUN PIPELINE — steps stay green with timing after done
// ════════════════════════════════════════════════════════
runBtn.addEventListener('click',async()=>{
  if(!origData||!pipeline.length)return;
  runBtn.disabled=true;dlBtn.disabled=true;
  hasAfter=false;
  proc.classList.add('on');
  let cur=new Uint8ClampedArray(origData.data);
  const t0=performance.now();
  let totalMs=0;

  for(let i=0;i<pipeline.length;i++){
    const s=pipeline[i];
    // Mark active
    $('sc'+i).className='sc active';
    pt.textContent='Step '+(i+1)+'/'+pipeline.length+': '+s.name;
    ps.textContent=s.reason;
    await new Promise(r=>setTimeout(r,60));

    const ts=performance.now();
    cur=s.fn(cur,imgW,imgH,s.params);
    const ms=Math.round(performance.now()-ts);
    totalMs+=ms;

    // Mark done — permanently green with time shown
    $('sc'+i).className='sc done';
    $('sn'+i).textContent='✓';
    $('st'+i).textContent=ms+'ms';
    // Show what it contributed
    $('sr'+i).textContent='→ Applied in '+ms+'ms';
  }

  const totalRound=Math.round(performance.now()-t0);
  enhData=new ImageData(cur,imgW,imgH);
  offAfter.getContext('2d').putImageData(enhData,0,0);
  hasAfter=true;
  splitPos=.5; // Reset divider to center
  drawSplit();

  // Update pipeline header to "Results" — stays permanently
  pLabel.textContent='✓ Pipeline Results';
  pLabel.className='sec-label done';
  pSum.textContent='✓ '+pipeline.length+' steps complete · total '+totalRound+'ms · drag divider to compare';
  pSum.className='pipe-summary done';

  stStat.textContent=totalRound+'ms';
  proc.classList.remove('on');
  runBtn.disabled=false;
  dlBtn.disabled=false;
  showToast('Done in '+totalRound+'ms — enhanced image ready ✓');
  setTimeout(()=>pSteps.scrollIntoView({behavior:'smooth',block:'nearest'}),100);
});

// ════════════════════════════════════════════════════════
//  RESET
// ════════════════════════════════════════════════════════
rstBtn.addEventListener('click',()=>{
  if(!origData)return;
  enhData=null;hasAfter=false;
  offAfter.getContext('2d').putImageData(origData,0,0);
  drawSplit();
  dlBtn.disabled=true;stStat.textContent='—';
  // Reset step cards back to waiting state
  pLabel.textContent='Auto Pipeline';pLabel.className='sec-label';
  pSum.textContent=pipeline.length+' step'+(pipeline.length>1?'s':'')+': '+pipeline.map(s=>s.name).join(' → ');
  pSum.className='pipe-summary';
  pipeline.forEach((_,i)=>{
    $('sc'+i).className='sc';
    $('sn'+i).textContent=i+1;
    $('st'+i).textContent='';
    $('sr'+i).textContent='';
  });
  showToast('Reset to original');
});

// ════════════════════════════════════════════════════════
//  DOWNLOAD
// ════════════════════════════════════════════════════════
dlBtn.addEventListener('click',()=>{
  if(!enhData)return;
  const tmp=document.createElement('canvas');tmp.width=imgW;tmp.height=imgH;
  tmp.getContext('2d').putImageData(enhData,0,0);
  const a=document.createElement('a');a.href=tmp.toDataURL('image/png');
  a.download='pixellab_enhanced_'+Date.now()+'.png';a.click();
  showToast('Enhanced image saved as PNG ✓');
});
newBtn.addEventListener('click',()=>fin.click());

// ════════════════════════════════════════════════════════
//  UPLOAD EVENTS
// ════════════════════════════════════════════════════════
uzone.addEventListener('dragover',e=>{e.preventDefault();uzone.classList.add('over');});
uzone.addEventListener('dragleave',()=>uzone.classList.remove('over'));
uzone.addEventListener('drop',e=>{e.preventDefault();uzone.classList.remove('over');loadImage(e.dataTransfer.files[0]);});
fin.addEventListener('change',()=>loadImage(fin.files[0]));
$('carea').addEventListener('dragover',e=>e.preventDefault());
$('carea').addEventListener('drop',e=>{e.preventDefault();loadImage(e.dataTransfer.files[0]);});

// ════════════════════════════════════════════════════════
//  TOAST
// ════════════════════════════════════════════════════════
let tt;
function showToast(m){toastEl.textContent=m;toastEl.style.display='block';clearTimeout(tt);tt=setTimeout(()=>toastEl.style.display='none',2600);}

// ════════════════════════════════════════════════════════
//  SERVICE WORKER
// ════════════════════════════════════════════════════════
if('serviceWorker' in navigator){
  const sw=`const C='plv4';self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(clients.claim()));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}
</script>
</body>
